# Build & Publish Images
#
# Builds multi-arch Docker images and pushes them to GitHub Container
# Registry (GHCR). Triggered on pushes to main (produces :latest tags)
# and on semantic version tags v*.*.* (produces :1.2.3 / :1.2 tags).
#
# Image URLs:
#   ghcr.io/<owner>/time-tracker-api:<tag>
#   ghcr.io/<owner>/time-tracker-frontend:<tag>
#
# Tag strategy (generated by docker/metadata-action):
#   v1.2.3 git tag  → :1.2.3, :1.2, :sha-<short>, :latest
#   push to main    → :sha-<short>, :latest
#   pull request    → :sha-<short>  (build only, no push)
#
# Platforms: linux/amd64 and linux/arm64 — covers AWS EC2/Graviton,
#   GCP, Azure, Apple Silicon dev machines and ARM-based k8s nodes.
#
# Cache: GitHub Actions cache (type=gha) scoped per image for maximum
#   layer reuse across runs without cross-contamination.

name: Build & Publish Images

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  # Manual trigger — useful for republishing without a code change
  workflow_dispatch:
    inputs:
      push:
        description: Push images to registry
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

# ──────────────────────────────────────────────────────────────
# Shared setup: reused by both api and frontend jobs via
# a composite action defined inline with `uses: ./.github/actions/...`
# (or duplicated here for simplicity — see comments per step).
# ──────────────────────────────────────────────────────────────

jobs:
  # ────────────────────────────────────────────────────────────
  # API image
  # ────────────────────────────────────────────────────────────
  build-api:
    name: API Image
    runs-on: ubuntu-latest

    permissions:
      contents: read   # checkout
      packages: write  # push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generates Docker tags from git context (branch, tag, SHA).
      # Output `tags` and `labels` are consumed by build-push-action.
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/time-tracker-api
          tags: |
            # :1.2.3 — full semver, only on git tags
            type=semver,pattern={{version}}
            # :1.2   — major.minor, only on git tags
            type=semver,pattern={{major}}.{{minor}}
            # :sha-abc1234 — always present for traceability
            type=sha,prefix=sha-,format=short
            # :latest — only on pushes to the default branch
            type=raw,value=latest,enable={{is_default_branch}}

      # QEMU provides ARM64 emulation on the amd64 GitHub runner.
      # Required only for cross-arch builds (linux/arm64).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # BuildKit is required for multi-arch builds and cache exports.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is skipped on pull_request events to avoid exposing secrets.
      # PRs can still build the image — they just don't push.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          platforms: linux/amd64,linux/arm64
          # Push on main/tags; skip push on PRs or manual runs without push=true
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          # GHA cache: imports previous layers, exports new ones (mode=max
          # caches all intermediate layers, not just the final stage).
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  # ────────────────────────────────────────────────────────────
  # Frontend image
  # ────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/time-tracker-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
