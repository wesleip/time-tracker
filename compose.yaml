services:
  db:
    image: postgres:16-alpine
    container_name: time-tracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: time_tracker
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - time-tracker-net
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: time-tracker-api:latest
    container_name: time-tracker-api
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      DATABASE_URL: postgresql://postgres:postgres@db:5432/time_tracker
      CORS_ORIGINS: http://localhost:5173,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - time-tracker-net
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: time-tracker-frontend:latest
    container_name: time-tracker-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks:
      - time-tracker-net
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE

networks:
  time-tracker-net:
    name: time-tracker-network
    driver: bridge

volumes:
  pgdata:
